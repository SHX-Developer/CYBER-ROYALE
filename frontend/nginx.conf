resolver 127.0.0.11 valid=10s ipv6=off;

# Не кешируем upstream "временно отключен" при единичном connect refused —
# bекap к моменту, когда backend healthy уже не интересны.
upstream cyber_backend {
  server backend:3000 max_fails=0 fail_timeout=0;
  keepalive 16;
  keepalive_requests 1000;
  keepalive_timeout 60s; # backend держит keepAliveTimeout 75s — nginx закрывает первым
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://cyber_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    # Если backend ответил сетевой ошибкой/таймаутом — повторить запрос.
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 3;
    proxy_next_upstream_timeout 10s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
