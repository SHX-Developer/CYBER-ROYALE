# Docker DNS — для возможных будущих переменных, и чтобы upstream-блок
# мог дорезолвить backend при холодном старте.
resolver 127.0.0.11 valid=10s ipv6=off;

# Главный фикс шума «upstream temporarily disabled»: свой upstream-блок
# с max_fails=0 / fail_timeout=0 — nginx больше не маркирует backend
# как «временно отключённый» после единичного connect refused.
upstream cyber_backend {
  server backend:3000 max_fails=0 fail_timeout=0;
  keepalive 16;
  keepalive_requests 1000;
  keepalive_timeout 60s;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Healthcheck — без access-логов, и должен быть всегда виден в error.log.
  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location /api/ {
    # Подавляем шум от транзиентных connect refused — настоящий ответ
    # пользователю всё равно уходит благодаря proxy_next_upstream.
    # Реальные ошибки приложения видны в access_log по статусам.
    error_log /var/log/nginx/error.log crit;

    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://cyber_backend;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Если первая попытка не дошла — nginx сам ретранслирует на тот же
    # backend. non_idempotent разрешает повторить и POST'ы (auth/telegram
    # — upsert по telegramId, идемпотентен на уровне БД).
    proxy_next_upstream error timeout http_502 http_503 http_504 non_idempotent;
    proxy_next_upstream_tries 3;
    proxy_next_upstream_timeout 10s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
