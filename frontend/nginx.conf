# Docker DNS — резолвится при каждом запросе, чтобы переезд IP backend
# не ломал nginx до перезапуска.
resolver 127.0.0.11 valid=5s ipv6=off;

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location /api/ {
    # Хост в переменной → nginx резолвит DNS на каждый запрос (а не один раз
    # на старте). Никакого fail_timeout/max_fails по умолчанию здесь нет —
    # нет «temporarily disabled» в логах.
    set $backend_upstream backend:3000;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://$backend_upstream;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Если первая попытка не дошла — nginx сам ретранслирует. non_idempotent
    # разрешает повторять и POST'ы (auth/telegram нам это позволяет —
    # upsert по telegramId идемпотентен на уровне БД).
    proxy_next_upstream error timeout http_502 http_503 http_504 non_idempotent;
    proxy_next_upstream_tries 3;
    proxy_next_upstream_timeout 10s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
