services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      DEV_AUTO_LOGIN: ${DEV_AUTO_LOGIN:-0}
      PORT: 3000
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-1}
      RUN_SEED: ${RUN_SEED:-1}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    expose:
      - "3000"
    networks:
      - default
      - dokploy-network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"

networks:
  dokploy-network:
    external: true
